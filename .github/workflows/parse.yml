name: Parse Bank Rates

on:
  # 08:00 Бишкек = 02:00 UTC (UTC+6)
  # 16:00 Бишкек = 10:00 UTC
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 10 * * *'

  # Ручной запуск из интерфейса GitHub
  workflow_dispatch:

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Chrome & ChromeDriver
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q google-chrome-stable
          google-chrome --version

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run parser
        env:
          Project_URL:        ${{ secrets.SUPABASE_URL }}
          Publishable_API_Key: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scheduler.py --once
